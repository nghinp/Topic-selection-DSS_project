<div class="page">
  <app-navbar></app-navbar>

  <main class="content">
    <section class="card flow">
      <header class="flow__header">
        <h1>Generate a Free Thesis Topic</h1>
        <div class="stepper" aria-label="Progress">
          <span class="stepper__circle stepper__circle--current" aria-current="step">1</span>
          <span class="stepper__line"></span>
          <span class="stepper__circle">2</span>
          <span class="stepper__line"></span>
          <span class="stepper__circle">3</span>
          <span class="stepper__line"></span>
          <span class="stepper__circle">4</span>
        </div>
      </header>

      <section class="flow__section">
        <h2>Thesis Type</h2>
        <p class="flow__subtitle">Which of the following sounds more interesting to you?</p>

        <form class="flow__form" novalidate>
          <div class="question-card">
            <div class="question-card__body">
              <fieldset class="form-field form-field--radio">
                <legend>Choose one option</legend>
                <div class="radio-group">
                  <label class="radio-option">
                    <input
                      type="radio"
                      name="thesisHint"
                      value="research"
                      [(ngModel)]="wizard.thesisHint"
                      required
                      (change)="onFieldChange()"
                    />
                    <span>Designing algorithms or models and evaluating their performance</span>
                  </label>
                  <label class="radio-option">
                    <input
                      type="radio"
                      name="thesisHint"
                      value="practical"
                      [(ngModel)]="wizard.thesisHint"
                      required
                      (change)="onFieldChange()"
                    />
                    <span>Building an application or system that people can actually use</span>
                  </label>
                </div>
                <p class="form-error" *ngIf="showErrors && !wizard.thesisHint">Please select one option.</p>
              </fieldset>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn ghost" (click)="onBack()">Back</button>
            <span class="spacer"></span>
            <button
              type="button"
              class="btn primary"
              [class.btn--disabled]="!isStepValid"
              [attr.aria-disabled]="!isStepValid"
              (click)="onNextAttempt()"
            >
              Next
            </button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__left">
      <span class="brand">TopicInsights</span>
      <p class="muted">A smart decision support system for thesis topic selection.</p>
    </div>

    <div class="footer__links">
      <a href="/about">About</a>
      <a href="#">Guides</a>
      <a href="#">Privacy</a>
    </div>
  </footer>
</div>
