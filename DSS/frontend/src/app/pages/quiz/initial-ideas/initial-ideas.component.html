<div class="page">
  <app-navbar></app-navbar>

  <main class="content">
    <section class="card flow">
      <header class="flow__header">
        <h1>Generate a Free Thesis Topic</h1>
        <div class="stepper" aria-label="Progress">
          <span class="stepper__circle stepper__circle--active">1</span>
          <span class="stepper__line stepper__line--active"></span>
          <span class="stepper__circle stepper__circle--current" aria-current="step">2</span>
          <span class="stepper__line"></span>
          <span class="stepper__circle">3</span>
          <span class="stepper__line"></span>
          <span class="stepper__circle">4</span>
        </div>
      </header>

      <section class="flow__section">
        <h2>Your Initial Ideas</h2>
        <p class="flow__subtitle">
          Now we’d like to know if you already have any initial thematic ideas for your academic work.
        </p>

        <form class="flow__form" novalidate>
          <div class="question-grid">
            <div class="question-card">
              <div class="question-card__body">
                <label for="initialIdeas">Do you already have topic ideas?</label>
                <input
                  id="initialIdeas"
                  name="initialIdeas"
                  type="text"
                  placeholder="Keywords separated by commas"
                  [(ngModel)]="wizard.initialIdeas"
                />
              </div>
            </div>

            <div class="question-card">
              <div class="question-card__body">
                <label for="excludeTopics">Which topics would you like to exclude?</label>
                <input
                  id="excludeTopics"
                  name="excludeTopics"
                  type="text"
                  placeholder="Keywords separated by commas"
                  [(ngModel)]="wizard.excludeTopics"
                />
              </div>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn ghost" (click)="onBack()">Back</button>
            <span class="spacer"></span>
            <button type="button" class="btn primary" (click)="onNext()">Next</button>
          </div>
        </form>
      </section>
    </section>
  </main>

</div>
