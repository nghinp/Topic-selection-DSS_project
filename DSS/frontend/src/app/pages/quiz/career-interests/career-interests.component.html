<div class="page">
  <app-navbar></app-navbar>

  <main class="content">
    <section class="card flow">
      <header class="flow__header">
        <h1>Generate a Free Thesis Topic</h1>
        <div class="stepper" aria-label="Progress">
          <span class="stepper__circle stepper__circle--active">1</span>
          <span class="stepper__line stepper__line--active"></span>
          <span class="stepper__circle stepper__circle--active">2</span>
          <span class="stepper__line stepper__line--active"></span>
          <span class="stepper__circle stepper__circle--current" aria-current="step">3</span>
          <span class="stepper__line"></span>
          <span class="stepper__circle">4</span>
        </div>
      </header>

      <section class="flow__section">
        <h2>Your Interests</h2>
        <p class="flow__subtitle">
          Finally, a few questions about your career plans and structured interests.
        </p>

        <form class="flow__form" novalidate>
          <div class="question-grid">
            <div class="question-card">
              <div class="question-card__body">
                <label for="careerGoal">What career are you aiming for?</label>
                <input
                  id="careerGoal"
                  name="careerGoal"
                  type="text"
                  placeholder="e.g. Data analyst, Product manager"
                  [(ngModel)]="wizard.careerGoal"
                />
              </div>
            </div>
          </div>

          <div class="question-card question-card--full">
            <div class="question-card__body">
              <label>Choose structured interests</label>
              <div class="interest-grid">
                <label class="interest-option" *ngFor="let interest of interestOptions">
                  <input
                    type="checkbox"
                    [checked]="isInterestSelected(interest)"
                    (change)="toggleInterest(interest, $event.target.checked)"
                  />
                  <span>{{ interest }}</span>
                </label>
              </div>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn ghost" (click)="onBack()">Back</button>
            <span class="spacer"></span>
            <button type="button" class="btn primary" (click)="onNext()">Next</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__left">
      <span class="brand">TopicInsights</span>
      <p class="muted">A smart decision support system for thesis topic selection.</p>
    </div>

    <div class="footer__links">
      <a href="/about">About</a>
      <a href="#">Guides</a>
      <a href="#">Privacy</a>
    </div>
  </footer>
</div>
