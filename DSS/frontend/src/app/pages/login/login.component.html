<div class="page">
  <div class="login-bg-decoration">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <app-navbar></app-navbar>

  <main class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">LOGIN</h2>

      <form class="auth-form" (ngSubmit)="submit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="Your email address" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Your password"
            required />
        </div>

        <!-- <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" name="remember" checked />
            <span class="checkmark"></span>
            Remember me?
          </label>
        </div> -->

        <button type="submit" class="btn-login">LOGIN</button>

        <div class="helper-links">
          <a class="forgot-link">Forgot Password?</a>
        </div>



        <p class="signup-text">
          Need an account? <a routerLink="/register">SIGN UP</a>
        </p>

        <p class="alert" *ngIf="error">{{ error }}</p>
      </form>
    </div>
  </main>
</div>
