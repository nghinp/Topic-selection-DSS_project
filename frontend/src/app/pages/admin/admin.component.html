<div class="page">
  <app-navbar></app-navbar>

  <main class="content">
    <div class="status-fixed" *ngIf="success || error">
      <span class="success" *ngIf="success">{{ success }}</span>
      <span class="error" *ngIf="error">{{ error }}</span>
    </div>

    <section class="card table-card">
      <div class="table-header">
        <div class="header-main">
          <h3>Existing topics</h3>
          <span class="muted" *ngIf="loading">Loading...</span>
        </div>
        <button class="btn primary" (click)="openAddModal()">+ Add New Topic</button>
      </div>

      <div *ngIf="!topics.length && !loading" class="empty muted">No topics yet.</div>

      <table *ngIf="topics.length">
        <thead>
          <tr>
            <th>Area</th>
            <th>Type</th>
            <th>Title</th>
            <th>Difficulty</th>
            <th class="actions-col">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of topics; trackBy: trackById">
            <td class="mono">{{ t.area }}</td>
            <td>{{ t.thesisType || '-' }}</td>
            <td><strong>{{ t.title }}</strong></td>
            <td>
              <span class="badge" [class]="t.difficulty?.toLowerCase()">{{ t.difficulty || '-' }}</span>
            </td>
            <td class="row-actions">
              <button class="btn ghost small" type="button" (click)="edit(t)" [disabled]="saving">Edit</button>
              <button class="btn ghost small danger" type="button" (click)="remove(t.id)" [disabled]="saving">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" *ngIf="isModalOpen" (click)="$event.target === $any($event.currentTarget) && closeModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ editingId ? 'Edit topic' : 'Add topic' }}</h3>
        <button class="close-btn" (click)="closeModal()">&times;</button>
      </div>
      
      <div class="modal-body">
        <section class="card form-card">
          <div class="form-header">
            <span class="muted" *ngIf="saving">Saving...</span>
            <div class="status" *ngIf="error">
              <span class="error">{{ error }}</span>
            </div>
          </div>

          <div class="form-grid">
            <label>
              <span>Area</span>
              <select [(ngModel)]="draft.area">
                <option value="">Select area</option>
                <option *ngFor="let code of areaOptions" [value]="code">{{ code }}</option>
              </select>
            </label>

            <label>
              <span>Thesis Type</span>
              <select [(ngModel)]="draft.thesisType">
                <option value="">Select type</option>
                <option value="Research">Research</option>
                <option value="Practical">Practical</option>
              </select>
            </label>

            <label>
              <span>Title</span>
              <input type="text" [(ngModel)]="draft.title" placeholder="e.g., AI thesis idea" />
            </label>

            <label>
              <span>Difficulty</span>
              <select [(ngModel)]="draft.difficulty">
                <option value="">Select difficulty</option>
                <option *ngFor="let option of difficultyOptions" [value]="option">{{ option }}</option>
              </select>
            </label>
          </div>

          <label class="full">
            <span>Short Description</span>
            <textarea rows="2" [(ngModel)]="draft.shortDescription" placeholder="Short summary shown in recommendation and topic detail."></textarea>
          </label>

          <label class="full">
            <span>Description</span>
            <textarea rows="3" [(ngModel)]="draft.description" placeholder="Optional summary for this topic."></textarea>
          </label>

          <div class="full field-block">
            <span class="field-label">Interests (up to 3)</span>
            <div class="interest-grid">
              <label class="interest-option" *ngFor="let interest of interestOptions">
                <input
                  type="checkbox"
                  [checked]="isInterestSelected(interest)"
                  [disabled]="!isInterestSelected(interest) && draft.interests.length >= 3"
                  (change)="toggleInterest(interest, $any($event.target).checked)"
                />
                <span>{{ interest }}</span>
              </label>
            </div>
          </div>

          <div class="detail-grid">
            <label class="full">
              <span>Problem Overview</span>
              <textarea
                rows="5"
                [ngModel]="sectionText('problemOverview')"
                (ngModelChange)="updateDetailSection('problemOverview', $event)"
                placeholder="One paragraph or bullet per line."></textarea>
            </label>

            <label class="full">
              <span>Research Objectives</span>
              <textarea
                rows="5"
                [ngModel]="sectionText('researchObjectives')"
                (ngModelChange)="updateDetailSection('researchObjectives', $event)"
                placeholder="One objective per line."></textarea>
            </label>

            <label class="full">
              <span>Methodology</span>
              <textarea
                rows="5"
                [ngModel]="sectionText('methodology')"
                (ngModelChange)="updateDetailSection('methodology', $event)"
                placeholder="One step per line."></textarea>
            </label>

            <label class="full">
              <span>Technologies</span>
              <textarea
                rows="5"
                [ngModel]="sectionText('technologies')"
                (ngModelChange)="updateDetailSection('technologies', $event)"
                placeholder="One technology per line."></textarea>
            </label>
          </div>

          <div class="actions">
            <button class="btn primary" type="button" (click)="submit()" [disabled]="saving">
              {{ editingId ? 'Update topic' : 'Create topic' }}
            </button>
            <button class="btn ghost" type="button" (click)="closeModal()" [disabled]="saving">Cancel</button>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>
